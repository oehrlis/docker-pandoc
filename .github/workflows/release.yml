name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_REPO: oehrlis/pandoc

jobs:
  build-and-release:
    name: Build and Release Multi-Platform Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all variants (multi-platform)
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          for variant in minimal standard mermaid full; do
            echo "==> Building variant: ${variant}"
            extra_tags=""
            if [ "${variant}" = "standard" ]; then
              extra_tags="--tag ${{ env.DOCKER_REPO }}:${VERSION} --tag ${{ env.DOCKER_REPO }}:latest"
            fi
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg IMAGE_VARIANT=${variant} \
              --tag ${{ env.DOCKER_REPO }}:${VERSION}-${variant} \
              ${extra_tags} \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .
          done

      - name: Pull standard image for sample generation
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          docker pull ${{ env.DOCKER_REPO }}:${VERSION}-standard
          docker pull ${{ env.DOCKER_REPO }}:${VERSION}-full

      - name: Build sample documents
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          STD="${{ env.DOCKER_REPO }}:${VERSION}-standard"
          FULL="${{ env.DOCKER_REPO }}:${VERSION}-full"

          # Build PDF/DOCX/PPTX samples (standard variant)
          docker run --rm -v "$PWD:/workdir:z" "${STD}" \
            --metadata-file sample/metadata.yml --filter pandoc-latex-environment \
            --resource-path=sample --pdf-engine=xelatex \
            --listings -o sample/sample-release.pdf sample/sample.md

          docker run --rm -v "$PWD:/workdir:z" "${STD}" \
            --metadata-file sample/metadata.yml --resource-path=sample \
            --listings -o sample/sample-release.docx sample/sample.md

          docker run --rm -v "$PWD:/workdir:z" "${STD}" \
            --metadata-file sample/metadata.yml --resource-path=sample \
            --listings -o sample/sample-release.pptx sample/sample.md

          # Build mermaid sample (full variant)
          docker run --rm -v "$PWD:/workdir:z" "${FULL}" \
            sample/sample-mermaid.md \
            -o sample/sample-mermaid-release.pdf \
            --lua-filter /usr/local/share/pandoc/filters/mermaid.lua \
            --pdf-engine=xelatex \
            --toc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: |
            sample/sample-release.pdf
            sample/sample-release.docx
            sample/sample-release.pptx
            sample/sample-mermaid-release.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
