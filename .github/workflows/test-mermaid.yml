name: Test Mermaid Rendering

on:
  push:
    paths:
      - 'mermaid.lua'
      - 'sample/sample-mermaid.md'
      - '.github/workflows/test-mermaid.yml'
  pull_request:
    paths:
      - 'mermaid.lua'
      - 'sample/sample-mermaid.md'

jobs:
  test-mermaid-full:
    name: Test Mermaid Rendering (full variant)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build full variant
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: IMAGE_VARIANT=full
          tags: oehrlis/pandoc:ci-full
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render Mermaid diagrams to PDF
        run: |
          docker run --rm \
            -v "$PWD:/workdir:z" \
            oehrlis/pandoc:ci-full \
            sample/sample-mermaid.md \
            -o sample/sample-mermaid-test.pdf \
            --lua-filter /usr/local/share/pandoc/filters/mermaid.lua \
            --pdf-engine=xelatex \
            --toc

      - name: Verify output
        run: |
          if [ -f sample/sample-mermaid-test.pdf ]; then
            size=$(stat -c%s sample/sample-mermaid-test.pdf 2>/dev/null || \
                   stat -f%z sample/sample-mermaid-test.pdf)
            echo "PDF generated: ${size} bytes"
            if [ "${size}" -lt 10000 ]; then
              echo "Error: PDF suspiciously small (${size} bytes)"
              exit 1
            fi
          else
            echo "Error: PDF not generated"
            exit 1
          fi
          if ls build/mermaid/*.png 1>/dev/null 2>&1; then
            echo "Mermaid PNGs found:"
            ls -lh build/mermaid/*.png
          else
            echo "Warning: No Mermaid PNGs found in build/mermaid/"
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-test-pdf
          path: sample/sample-mermaid-test.pdf

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mermaid-diagrams
          path: build/mermaid/*.png
